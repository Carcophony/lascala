<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>The Ladder</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;500;600;700;900&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --blue: #1B6EF3;
    --blue-light: #EEF4FD;
    --white: #ffffff;
    --off-white: #FAFAF8;
    --ink: #0A0A0A;
    --ink2: #444;
    --ink3: #888;
    --ink4: #CCC;
    --border: #E8E8E2;
    --green: #16A34A;
    --red: #DC2626;
    --amber: #D97706;
  }
  html, body {
    height: 100%; width: 100%;
    overflow: hidden;
    background: var(--white);
    font-family: 'Barlow', sans-serif;
    color: var(--ink);
    -webkit-font-smoothing: antialiased;
  }
  #app {
    height: 100dvh; width: 100%;
    max-width: 420px; margin: 0 auto;
    display: flex; flex-direction: column;
    overflow: hidden;
  }

  /* HEADER */
  #header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 12px 16px 10px;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }
  #logo { display: flex; align-items: center; gap: 8px; }
  #logo-icon {
    width: 26px; height: 26px;
    background: var(--blue); border-radius: 5px;
    display: flex; align-items: center; justify-content: center;
  }
  #logo-text {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 20px; font-weight: 700; letter-spacing: 0.02em; color: var(--ink);
  }
  #logo-text span { color: var(--blue); }
  #game-meta { text-align: right; font-size: 11px; color: var(--ink3); font-weight: 500; letter-spacing: 0.06em; line-height: 1.5; }

  /* POSITION PANEL */
  #position-panel {
    background: var(--blue);
    padding: 14px 16px 12px;
    flex-shrink: 0; position: relative; overflow: hidden;
  }
  #position-panel::after {
    content: ''; position: absolute; right: -20px; top: -20px;
    width: 100px; height: 100px;
    border: 12px solid rgba(255,255,255,0.06); border-radius: 50%;
  }
  #pos-row { display: flex; align-items: flex-end; justify-content: space-between; }
  #pos-label { font-size: 10px; font-weight: 600; letter-spacing: 0.12em; text-transform: uppercase; color: rgba(255,255,255,0.6); margin-bottom: 2px; }
  #pos-number { font-family: 'Barlow Condensed', sans-serif; font-size: 64px; font-weight: 900; color: white; line-height: 1; letter-spacing: -0.02em; }
  #pos-zone { display: inline-block; font-size: 11px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; padding: 3px 10px; border-radius: 20px; margin-top: 4px; background: rgba(255,255,255,0.15); color: white; }
  #pos-right { text-align: right; padding-bottom: 4px; }
  #odds-label { font-size: 10px; color: rgba(255,255,255,0.5); letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 2px; }
  #odds-value { font-family: 'Barlow Condensed', sans-serif; font-size: 32px; font-weight: 700; color: white; line-height: 1; }
  #odds-sub { font-size: 11px; color: rgba(255,255,255,0.5); margin-top: 2px; }
  #win-pct { font-size: 12px; color: rgba(255,255,255,0.6); margin-top: 6px; }

  /* LADDER */
  #ladder-section {
    flex: 1; display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    padding: 8px 16px; min-height: 0;
  }
  #ladder-viewport { width: 100%; max-width: 280px; }
  .rung-row { display: flex; align-items: center; gap: 10px; padding: 4px 0; }
  .rung-number { font-family: 'Barlow Condensed', sans-serif; font-size: 13px; font-weight: 600; color: var(--ink4); width: 28px; text-align: right; flex-shrink: 0; }
  .rung-bar { flex: 1; height: 10px; border-radius: 3px; background: var(--border); }
  .rung-spacer { width: 18px; flex-shrink: 0; }
  .rung-row.is-top .rung-bar { background: var(--blue); }
  .rung-row.is-top .rung-number { color: var(--blue); font-weight: 700; }
  .rung-row.is-passed .rung-bar { background: #DDEAFC; }
  .rung-row.is-passed .rung-number { color: var(--ink4); }
  .rung-row.is-current .rung-bar { background: var(--ink); }
  .rung-row.is-current .rung-number { color: var(--ink); font-weight: 700; }
  .rung-row.is-future .rung-bar { background: #E8E8E2; }
  .rung-row.is-future .rung-number { color: var(--ink4); }
  .rung-row.is-gap { justify-content: center; padding: 0; }
  .gap-dots { font-size: 11px; color: var(--ink4); letter-spacing: 0.15em; padding: 1px 0; }
  .shooter-dot {
    width: 18px; height: 18px; border-radius: 50%;
    background: var(--ink); border: 3px solid white;
    box-shadow: 0 0 0 2px var(--ink);
    flex-shrink: 0;
  }
  .rung-label-win { font-size: 10px; font-weight: 700; color: var(--blue); letter-spacing: 0.08em; text-transform: uppercase; flex-shrink: 0; }

  /* HEDGE */
  #hedge-badge {
    display: none; align-items: center; gap: 6px;
    background: #FFFBEB; border: 1px solid #FDE68A;
    border-radius: 6px; padding: 5px 10px;
    font-size: 11px; color: #92400E; font-weight: 500;
    margin-top: 6px;
  }
  #hedge-badge.visible { display: flex; }

  /* DICE */
  #dice-section {
    padding: 8px 16px; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
  }
  #dice-idle { text-align: center; }
  #dice-idle-text { font-size: 13px; color: var(--ink3); }
  #dice-live { display: none; }
  .die-wrap { display: flex; flex-direction: column; align-items: center; gap: 4px; }
  .die {
    width: 54px; height: 54px;
    background: var(--off-white); border: 1.5px solid var(--border);
    border-radius: 10px; display: grid; place-items: center;
    font-family: 'Barlow Condensed', sans-serif; font-size: 28px; font-weight: 700; color: var(--ink);
  }
  .die.rolling { animation: dieRoll 0.45s ease-in-out; }
  .die.is-double { border-color: var(--red); background: #FFF5F5; color: var(--red); }
  @keyframes dieRoll {
    0%   { transform: rotate(0deg) scale(1); }
    25%  { transform: rotate(-9deg) scale(1.06); }
    50%  { transform: rotate(7deg) scale(0.94); }
    75%  { transform: rotate(-4deg) scale(1.02); }
    100% { transform: rotate(0deg) scale(1); }
  }
  .die-label { font-size: 10px; color: var(--ink3); font-weight: 500; }
  #diff-display { display: flex; flex-direction: column; align-items: center; gap: 2px; }
  #diff-equals { font-size: 20px; color: var(--ink4); font-weight: 300; }
  #diff-value {
    width: 46px; height: 46px; border-radius: 50%;
    background: var(--blue); color: white;
    display: grid; place-items: center;
    font-family: 'Barlow Condensed', sans-serif; font-size: 26px; font-weight: 700;
    transition: background 0.2s;
  }
  #diff-value.is-double { background: var(--red); }
  #diff-label { font-size: 10px; color: var(--ink3); font-weight: 500; }

  /* RESULT BAR */
  #result-bar {
    padding: 6px 16px; flex-shrink: 0;
    text-align: center; font-size: 13px; color: var(--ink3);
    min-height: 32px; display: flex; align-items: center; justify-content: center;
  }
  #result-bar.made-it { color: var(--green); font-weight: 600; }
  #result-bar.didnt { color: var(--red); font-weight: 600; }

  /* BUTTONS */
  #action-section { padding: 8px 16px 6px; flex-shrink: 0; display: flex; flex-direction: column; gap: 8px; }
  #predict-row { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  .predict-btn {
    padding: 14px 8px; border-radius: 8px; border: none;
    font-family: 'Barlow Condensed', sans-serif; font-size: 17px; font-weight: 700;
    letter-spacing: 0.04em; cursor: pointer; text-transform: uppercase;
    transition: transform 0.1s, opacity 0.2s;
  }
  .predict-btn:active { transform: scale(0.97); }
  .predict-btn:disabled { opacity: 0.3; cursor: not-allowed; transform: none; }
  #btn-make { background: var(--blue); color: white; }
  #btn-dont { background: var(--off-white); color: var(--ink); border: 1.5px solid var(--border); }
  .predict-btn.chosen { outline: 3px solid var(--ink); outline-offset: 2px; }
  #btn-make.chosen { outline-color: var(--blue); }

  #roll-btn {
    width: 100%; padding: 15px; background: var(--ink); color: white;
    border: none; border-radius: 8px;
    font-family: 'Barlow Condensed', sans-serif; font-size: 18px; font-weight: 700;
    letter-spacing: 0.06em; text-transform: uppercase;
    cursor: pointer; transition: transform 0.1s;
    display: none;
  }
  #roll-btn:active { transform: scale(0.98); }
  #roll-btn:disabled { opacity: 0.4; cursor: not-allowed; }

  /* FOOTER */
  #footer {
    padding: 8px 16px 12px; border-top: 1px solid var(--border);
    flex-shrink: 0; display: flex; align-items: center; justify-content: space-between;
  }
  #countdown-label { font-size: 10px; color: var(--ink3); font-weight: 500; letter-spacing: 0.08em; text-transform: uppercase; }
  #countdown-time { font-family: 'Barlow Condensed', sans-serif; font-size: 18px; font-weight: 700; color: var(--ink); }
  #share-btn {
    background: var(--blue); color: white; border: none; border-radius: 6px;
    padding: 8px 16px;
    font-family: 'Barlow Condensed', sans-serif; font-size: 14px; font-weight: 700;
    letter-spacing: 0.06em; text-transform: uppercase;
    cursor: pointer; opacity: 0; pointer-events: none; transition: opacity 0.3s;
  }
  #share-btn.visible { opacity: 1; pointer-events: all; }

  /* GAME OVER */
  #gameover {
    display: none; position: fixed; inset: 0;
    background: rgba(10,10,10,0.85); z-index: 100;
    align-items: center; justify-content: center; padding: 20px;
  }
  #gameover.show { display: flex; }
  #gameover-card { background: white; border-radius: 16px; width: 100%; max-width: 340px; overflow: hidden; }
  #gameover-header { background: var(--blue); padding: 20px; text-align: center; color: white; }
  #gameover-result { font-family: 'Barlow Condensed', sans-serif; font-size: 42px; font-weight: 900; line-height: 1; }
  #gameover-sub { font-size: 13px; color: rgba(255,255,255,0.7); margin-top: 4px; }
  #gameover-body { padding: 16px 20px; }
  #gameover-stats { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin-bottom: 12px; }
  .stat-cell { background: var(--off-white); border-radius: 8px; padding: 10px 8px; text-align: center; }
  .stat-num { font-family: 'Barlow Condensed', sans-serif; font-size: 24px; font-weight: 700; color: var(--ink); line-height: 1; }
  .stat-lbl { font-size: 10px; color: var(--ink3); font-weight: 500; margin-top: 2px; letter-spacing: 0.04em; text-transform: uppercase; }
  #share-card-preview { background: var(--blue); border-radius: 8px; padding: 14px; margin-bottom: 12px; }
  #scp-title { font-family: 'Barlow Condensed', sans-serif; font-size: 13px; font-weight: 700; color: rgba(255,255,255,0.6); letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 6px; }
  #scp-emoji { font-size: 20px; letter-spacing: 3px; margin-bottom: 6px; display: block; }
  #scp-text { font-size: 12px; color: rgba(255,255,255,0.8); line-height: 1.6; white-space: pre-line; }
  #gameover-btns { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  .go-btn {
    padding: 12px; border-radius: 8px; border: none;
    font-family: 'Barlow Condensed', sans-serif; font-size: 15px; font-weight: 700;
    letter-spacing: 0.04em; text-transform: uppercase; cursor: pointer; transition: transform 0.1s;
  }
  .go-btn:active { transform: scale(0.97); }
  #go-share { background: var(--blue); color: white; }
  #go-close { background: var(--off-white); color: var(--ink); border: 1.5px solid var(--border); }

  /* TOAST */
  #toast {
    position: fixed; bottom: 80px; left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: var(--ink); color: white;
    padding: 10px 20px; border-radius: 20px;
    font-size: 13px; font-weight: 500;
    opacity: 0; transition: opacity 0.2s, transform 0.2s;
    pointer-events: none; z-index: 200; white-space: nowrap;
  }
  #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>
<div id="app">

  <div id="header">
    <div id="logo">
      <div id="logo-icon">
        <svg width="14" height="16" viewBox="0 0 14 16" fill="none">
          <line x1="7" y1="0" x2="7" y2="16" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
          <line x1="1" y1="4" x2="13" y2="4" stroke="white" stroke-width="1.8" stroke-linecap="round"/>
          <line x1="1" y1="7" x2="13" y2="7" stroke="white" stroke-width="1.8" stroke-linecap="round"/>
          <line x1="1" y1="10" x2="13" y2="10" stroke="white" stroke-width="1.8" stroke-linecap="round"/>
          <line x1="1" y1="13" x2="13" y2="13" stroke="white" stroke-width="1.8" stroke-linecap="round"/>
        </svg>
      </div>
      <div id="logo-text">The <span>Ladder</span></div>
    </div>
    <div id="game-meta">
      <div id="game-number">GAME #1</div>
      <div id="game-date"></div>
    </div>
  </div>

  <div id="position-panel">
    <div id="pos-row">
      <div id="pos-left">
        <div id="pos-label">Steps to top</div>
        <div id="pos-number">—</div>
        <div id="pos-zone"></div>
        <div id="win-pct"></div>
      </div>
      <div id="pos-right">
        <div id="odds-label">Make It pays</div>
        <div id="odds-value">—</div>
        <div id="odds-sub">per unit staked</div>
      </div>
    </div>
  </div>

  <div id="ladder-section">
    <div id="ladder-viewport"></div>
    <div id="hedge-badge">⚡ Hedge — you've backed both sides</div>
  </div>

  <div id="dice-section">
    <div id="dice-idle"><div id="dice-idle-text">Make your prediction, then roll</div></div>
    <div id="dice-live">
      <div style="display:flex;align-items:center;gap:12px;">
        <div class="die-wrap">
          <div class="die" id="die1">·</div>
          <div class="die-label">DIE 1</div>
        </div>
        <div id="diff-display">
          <div id="diff-equals">=</div>
          <div id="diff-value">—</div>
          <div id="diff-label">DIFF</div>
        </div>
        <div class="die-wrap">
          <div class="die" id="die2">·</div>
          <div class="die-label">DIE 2</div>
        </div>
      </div>
    </div>
  </div>

  <div id="result-bar">Predict the outcome, then roll the dice</div>

  <div id="action-section">
    <div id="predict-row">
      <button class="predict-btn" id="btn-make" onclick="predict('make')">Make It</button>
      <button class="predict-btn" id="btn-dont" onclick="predict('dont')">Don't Make It</button>
    </div>
    <button id="roll-btn" onclick="rollDice()">Roll The Dice</button>
  </div>

  <div id="footer">
    <div>
      <div id="countdown-label">Next Ladder in</div>
      <div id="countdown-time">—</div>
    </div>
    <button id="share-btn" onclick="showGameOver()">Share Result</button>
  </div>

</div>

<div id="gameover">
  <div id="gameover-card">
    <div id="gameover-header">
      <div id="gameover-result">MADE IT!</div>
      <div id="gameover-sub">The Ladder #1 · CLASSIC</div>
    </div>
    <div id="gameover-body">
      <div id="gameover-stats">
        <div class="stat-cell"><div class="stat-num" id="gs-throws">0</div><div class="stat-lbl">Throws</div></div>
        <div class="stat-cell"><div class="stat-num" id="gs-start">0</div><div class="stat-lbl">Started at</div></div>
        <div class="stat-cell"><div class="stat-num" id="gs-correct">0/0</div><div class="stat-lbl">Correct</div></div>
      </div>
      <div id="share-card-preview">
        <div id="scp-title">The Ladder</div>
        <span id="scp-emoji"></span>
        <div id="scp-text"></div>
      </div>
      <div id="gameover-btns">
        <button class="go-btn" id="go-share" onclick="copyShare()">Copy &amp; Share</button>
        <button class="go-btn" id="go-close" onclick="closeGameOver()">Close</button>
      </div>
    </div>
  </div>
</div>

<div id="toast"></div>

<script>
// ── PROBABILITY TABLE ─────────────────────────────────────────────────────────
const WIN_PROB = {
  1:0.600846,2:0.585556,3:0.562134,4:0.530904,5:0.492301,
  6:0.446900,7:0.417000,8:0.387400,9:0.359000,10:0.332300,
  11:0.307800,12:0.285400,13:0.264500,14:0.245000,15:0.227100,
  16:0.210400,17:0.195000,18:0.180700,19:0.167400,20:0.155200
};
function getWinProb(pos) {
  if (pos <= 0) return 1;
  if (WIN_PROB[pos]) return WIN_PROB[pos];
  return 0.155152 * Math.pow(0.927, pos - 20);
}
function getMakeItOdds(pos) {
  return ((1 / getWinProb(pos)) * 0.95 - 1).toFixed(1);
}
function getZone(pos) {
  if (pos <= 5)  return { name:'ZONE',    col:'#DC2626' };
  if (pos <= 8)  return { name:'SHORT',   col:'#D97706' };
  if (pos <= 11) return { name:'CLASSIC', col:'#1B6EF3' };
  if (pos <= 14) return { name:'LONG',    col:'#16A34A' };
  return             { name:'EPIC',    col:'#7C3AED' };
}

// ── SEEDED RNG ────────────────────────────────────────────────────────────────
function makeMulberry32(seed) {
  // Returns a STATEFUL generator — each call() advances the sequence
  let s = seed >>> 0;
  return {
    next: function() {
      s = (s + 0x6D2B79F5) >>> 0;
      let t = Math.imul(s ^ (s >>> 15), 1 | s);
      t = (t + Math.imul(t ^ (t >>> 7), 61 | t)) ^ t;
      return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
    }
  };
}
function getDailySeed() {
  const d = new Date();
  return (d.getFullYear() * 10000 + (d.getMonth()+1) * 100 + d.getDate()) >>> 0;
}
function getDayNumber() {
  const epoch = new Date('2026-03-27'); epoch.setHours(0,0,0,0);
  const today = new Date(); today.setHours(0,0,0,0);
  return Math.max(1, Math.floor((today - epoch) / 86400000) + 1);
}

// ── GAME STATE ────────────────────────────────────────────────────────────────
// We pre-generate ALL dice for today's game from the seed.
// The game plays through them in order — same sequence for every player worldwide.
let rng, diceSequence, diceIndex;
let startPos, currentPos, gameOver;
let throws, diceHistory, correctPredictions;
let madeit, hedgeDetected, betMake, betDont;
let currentPrediction;
let isTestMode = false;

const CLASSIC_POSITIONS = [9, 10, 11];
const MAX_THROWS = 60; // safety cap — generates enough dice for any realistic game

function generateDiceSequence(rngObj, count) {
  const seq = [];
  for (let i = 0; i < count; i++) {
    const d1 = Math.floor(rngObj.next() * 6) + 1;
    const d2 = Math.floor(rngObj.next() * 6) + 1;
    seq.push({ d1, d2, diff: Math.abs(d1 - d2) });
  }
  return seq;
}

function initGame(testMode) {
  isTestMode = !!testMode;
  const seed = isTestMode ? (Math.random() * 0xFFFFFFFF >>> 0) : getDailySeed();

  rng = makeMulberry32(seed);
  // First rng call determines start position
  const idx = Math.floor(rng.next() * 3);
  startPos = CLASSIC_POSITIONS[idx];
  // Remaining rng calls generate dice
  diceSequence = generateDiceSequence(rng, MAX_THROWS);
  diceIndex = 0;

  currentPos = startPos;
  gameOver = false;
  throws = 0;
  diceHistory = [];
  correctPredictions = 0;
  madeit = false;
  hedgeDetected = false;
  betMake = false;
  betDont = false;
  currentPrediction = null;

  // Header
  document.getElementById('game-number').textContent = 'GAME #' + getDayNumber() + (isTestMode ? ' (TEST)' : '');
  const d = new Date();
  document.getElementById('game-date').textContent = d.toLocaleDateString('en-GB', {day:'numeric',month:'short',year:'numeric'});

  // UI reset
  document.getElementById('dice-idle').style.display = 'block';
  document.getElementById('dice-live').style.display = 'none';
  document.getElementById('result-bar').textContent = 'Predict the outcome, then roll the dice';
  document.getElementById('result-bar').className = '';
  document.getElementById('share-btn').classList.remove('visible');
  document.getElementById('hedge-badge').classList.remove('visible');
  document.getElementById('btn-make').disabled = false;
  document.getElementById('btn-dont').disabled = false;
  document.getElementById('roll-btn').style.display = 'none';
  document.getElementById('btn-make').classList.remove('chosen');
  document.getElementById('btn-dont').classList.remove('chosen');
  document.getElementById('die1').classList.remove('is-double');
  document.getElementById('die2').classList.remove('is-double');
  document.getElementById('diff-value').classList.remove('is-double');

  updatePositionPanel();
  renderLadder();
  startCountdown();
}

// ── POSITION PANEL ────────────────────────────────────────────────────────────
function updatePositionPanel() {
  document.getElementById('pos-number').textContent = currentPos;
  const zone = getZone(currentPos);
  const zoneEl = document.getElementById('pos-zone');
  zoneEl.textContent = zone.name;
  zoneEl.style.cssText = 'display:inline-block;font-size:11px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;padding:3px 10px;border-radius:20px;margin-top:4px;background:rgba(255,255,255,0.15);color:white;';
  document.getElementById('win-pct').textContent = (getWinProb(currentPos)*100).toFixed(1) + '% chance to make it';
  document.getElementById('odds-value').textContent = getMakeItOdds(currentPos) + '/1';
}

// ── LADDER RENDERER ───────────────────────────────────────────────────────────
function renderLadder() {
  const vp = document.getElementById('ladder-viewport');
  vp.innerHTML = '';

  // Window: always show TOP (0), then gap if needed, then up to 6 rungs around current
  const above = 2;
  const below = 3;
  const windowTop = Math.max(1, currentPos - above);
  const windowBot = Math.min(startPos, currentPos + below);
  const needGap = windowTop > 1;

  // TOP rung
  vp.appendChild(makeRungRow(0, 'is-top', true, false));

  // Gap indicator
  if (needGap) {
    const gap = document.createElement('div');
    gap.className = 'rung-row is-gap';
    gap.innerHTML = '<div class="gap-dots">· · ·</div>';
    vp.appendChild(gap);
  }

  // Window
  for (let p = windowTop; p <= windowBot; p++) {
    let cls = 'is-future';
    if (p < currentPos) cls = 'is-passed';
    if (p === currentPos) cls = 'is-current';
    vp.appendChild(makeRungRow(p, cls, false, p === currentPos));
  }
}

function makeRungRow(pos, cls, isTop, hasShooter) {
  const row = document.createElement('div');
  row.className = 'rung-row ' + cls;

  const numEl = document.createElement('div');
  numEl.className = 'rung-number';
  numEl.textContent = isTop ? 'TOP' : pos;

  const barEl = document.createElement('div');
  barEl.className = 'rung-bar';

  row.appendChild(numEl);
  row.appendChild(barEl);

  if (hasShooter) {
    const dot = document.createElement('div');
    dot.className = 'shooter-dot';
    row.appendChild(dot);
  } else if (isTop) {
    const lbl = document.createElement('div');
    lbl.className = 'rung-label-win';
    lbl.textContent = 'WIN';
    row.appendChild(lbl);
  } else {
    const sp = document.createElement('div');
    sp.className = 'rung-spacer';
    row.appendChild(sp);
  }

  return row;
}

// ── PREDICT ───────────────────────────────────────────────────────────────────
function predict(choice) {
  if (gameOver) return;
  currentPrediction = choice;
  if (choice === 'make') betMake = true;
  else betDont = true;
  if (betMake && betDont) {
    hedgeDetected = true;
    document.getElementById('hedge-badge').classList.add('visible');
  }
  document.getElementById('btn-make').classList.toggle('chosen', choice === 'make');
  document.getElementById('btn-dont').classList.toggle('chosen', choice === 'dont');
  document.getElementById('roll-btn').style.display = 'block';
  const rb = document.getElementById('result-bar');
  rb.textContent = (choice === 'make' ? 'Predicting: Make It' : 'Predicting: Don\'t Make It') + ' · Now roll';
  rb.className = '';
}

// ── ROLL ──────────────────────────────────────────────────────────────────────
function rollDice() {
  if (!currentPrediction || gameOver) return;
  if (diceIndex >= diceSequence.length) { showToast('Incredible game — sequence complete'); return; }

  const { d1, d2, diff } = diceSequence[diceIndex++];
  const isDouble = diff === 0;
  throws++;

  // Score prediction immediately: correct if prediction matches what WOULD happen
  // We score at end of game based on final outcome
  diceHistory.push({ d1, d2, diff, pos: currentPos, prediction: currentPrediction, isDouble });

  // Animate
  document.getElementById('dice-idle').style.display = 'none';
  document.getElementById('dice-live').style.display = 'block';
  const die1El = document.getElementById('die1');
  const die2El = document.getElementById('die2');
  const diffEl = document.getElementById('diff-value');

  die1El.classList.add('rolling'); die2El.classList.add('rolling');
  setTimeout(() => { die1El.classList.remove('rolling'); die2El.classList.remove('rolling'); }, 450);

  die1El.textContent = d1; die2El.textContent = d2; diffEl.textContent = diff;

  if (isDouble) {
    die1El.classList.add('is-double'); die2El.classList.add('is-double'); diffEl.classList.add('is-double');
  } else {
    die1El.classList.remove('is-double'); die2El.classList.remove('is-double'); diffEl.classList.remove('is-double');
  }

  if (isDouble) {
    endGame(false);
    return;
  }

  // Move
  let newPos = currentPos - diff;
  if (newPos < 0) {
    newPos = Math.abs(newPos); // bounce
    showToast('Bounce! Reflected back to ' + newPos);
  }

  if (newPos === 0) {
    endGame(true);
    return;
  }

  currentPos = newPos;
  updatePositionPanel();
  renderLadder();

  // Reset for next throw
  currentPrediction = null;
  document.getElementById('btn-make').classList.remove('chosen');
  document.getElementById('btn-dont').classList.remove('chosen');
  document.getElementById('btn-make').disabled = false;
  document.getElementById('btn-dont').disabled = false;
  document.getElementById('roll-btn').style.display = 'none';

  const rb = document.getElementById('result-bar');
  rb.textContent = 'Diff ' + diff + ' · Moved ' + diff + ' steps · Now at ' + currentPos;
  rb.className = '';
}

// ── END GAME ──────────────────────────────────────────────────────────────────
function endGame(madeIt) {
  gameOver = true; madeit = madeIt;

  // Score: correct if prediction matches final game outcome
  diceHistory.forEach(h => {
    if (madeIt && h.prediction === 'make') correctPredictions++;
    if (!madeIt && h.prediction === 'dont') correctPredictions++;
  });

  const rb = document.getElementById('result-bar');
  if (madeIt) { rb.textContent = '🏆 Made It! Shooter reached the top!'; rb.className = 'made-it'; }
  else { rb.textContent = '💀 Double! Shooter is out.'; rb.className = 'didnt'; }

  document.getElementById('btn-make').disabled = true;
  document.getElementById('btn-dont').disabled = true;
  document.getElementById('roll-btn').style.display = 'none';
  document.getElementById('share-btn').classList.add('visible');
}

// ── SHARE / GAME OVER ─────────────────────────────────────────────────────────
function buildEmoji() {
  return diceHistory.map((h, i) => {
    const isLast = i === diceHistory.length - 1;
    if (isLast && !madeit) return '💀';
    if (isLast && madeit) return '🏆';
    return h.prediction === 'make' ? '🟦' : '🟥';
  }).join('');
}

function showGameOver() {
  const zone = getZone(startPos);
  document.getElementById('gameover-result').textContent = madeit ? 'MADE IT!' : "DIDN'T MAKE IT";
  document.getElementById('gameover-sub').textContent = 'The Ladder #' + getDayNumber() + ' · ' + zone.name;
  document.getElementById('gameover-header').style.background = madeit ? '#1B6EF3' : '#DC2626';
  document.getElementById('gs-throws').textContent = throws;
  document.getElementById('gs-start').textContent = startPos;
  document.getElementById('gs-correct').textContent = correctPredictions + '/' + throws;

  const emoji = buildEmoji();
  const shareText =
    'The Ladder #' + getDayNumber() + ' · ' + zone.name + '\n' +
    (madeit ? 'MADE IT 🏆' : "DIDN'T MAKE IT 💀") + '\n' +
    emoji + '\n' +
    throws + ' throw' + (throws!==1?'s':'') + ' · ' + correctPredictions + '/' + throws + ' predicted correctly\n' +
    'theladdergame.com';

  document.getElementById('scp-emoji').textContent = emoji;
  document.getElementById('scp-text').textContent =
    '#' + getDayNumber() + ' · ' + zone.name + ' · ' + (madeit ? 'MADE IT 🏆' : "DIDN'T MAKE IT 💀") + '\n' +
    throws + ' throw' + (throws!==1?'s':'') + ' · ' + correctPredictions + '/' + throws + ' correct';

  document.getElementById('go-share').dataset.share = shareText;
  document.getElementById('gameover').classList.add('show');
}

function copyShare() {
  const text = document.getElementById('go-share').dataset.share;
  if (navigator.clipboard) {
    navigator.clipboard.writeText(text).then(() => { closeGameOver(); showToast('Copied! Ready to paste & share.'); });
  } else { showToast('Sharing not available in this browser'); }
}

function closeGameOver() { document.getElementById('gameover').classList.remove('show'); }

// ── COUNTDOWN ─────────────────────────────────────────────────────────────────
function startCountdown() {
  clearInterval(window._cdTimer);
  window._cdTimer = setInterval(() => {
    const now = new Date(), midnight = new Date();
    midnight.setHours(24,0,0,0);
    const ms = midnight - now;
    const h = Math.floor(ms/3600000), m = Math.floor((ms%3600000)/60000), s = Math.floor((ms%60000)/1000);
    document.getElementById('countdown-time').textContent =
      String(h).padStart(2,'0') + ':' + String(m).padStart(2,'0') + ':' + String(s).padStart(2,'0');
  }, 1000);
}

// ── TOAST ─────────────────────────────────────────────────────────────────────
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

// ── DEV RESET: shift-click game number for a random test game ─────────────────
document.getElementById('game-number').addEventListener('click', e => {
  if (e.shiftKey) { initGame(true); showToast('Test game — random seed'); }
});

// ── START ─────────────────────────────────────────────────────────────────────
initGame(false);
</script>
